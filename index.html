<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BottleCap Adapter Generator</title>
    <link rel="stylesheet" href="css/style.css">

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

    <!-- Three.js -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
        }
    }
    </script>
</head>
<body>

<!-- Header -->
<header>
    <div class="logo">BottleCap Adapter Generator</div>
    <div class="header-actions">
        <button id="btn-load" class="btn">Load Design</button>
    </div>
</header>

<!-- Main Layout -->
<div class="app-layout">

    <!-- Left: Form -->
    <div class="form-panel">

        <!-- Bottle A -->
        <div class="section-divider bottle-a">Bottle A -- Bottom</div>
        <div class="form-row">
            <label>Name</label>
            <input type="text" id="a-label" value="Bottle A" placeholder="e.g. Dawn Dish Soap">
        </div>
        <div class="form-row">
            <label title="Measure across the widest point of the threads on the bottle neck (peak to peak) with calipers.">Thread Diameter (mm)</label>
            <input type="number" id="a-od" step="0.1" min="5" max="200" placeholder="e.g. 28.5">
        </div>
        <div class="form-row">
            <label title="Distance between two adjacent thread peaks (crest to crest). If measuring across N peaks, divide by (N-1).">Thread Pitch (mm)</label>
            <input type="number" id="a-pitch" step="0.01" min="0.5" max="20" placeholder="e.g. 3.8">
        </div>
        <div class="form-row">
            <label title="Width of a single thread ridge -- the solid raised part only, not the gap.">Thread Width (mm)</label>
            <input type="number" id="a-thread-width" step="0.01" min="0.3" max="20" placeholder="e.g. 2.3">
        </div>
        <div class="form-row">
            <label title="Width of the gap/groove between two adjacent thread ridges.">Valley Width (mm)</label>
            <input type="number" id="a-valley-width" step="0.01" min="0.1" max="20" placeholder="e.g. 2.0">
        </div>
        <div id="a-pitch-note" class="pitch-note" style="display:none;"></div>
        <div class="form-row">
            <label title="Usually 1 (single-start). Count how many separate thread beginnings you see at the top of the neck.">Thread Starts</label>
            <input type="number" id="a-starts" step="1" min="1" max="8" value="1">
        </div>
        <div class="form-row">
            <label title="Height of a thread ridge from the neck surface to the top of the thread. Typical: 0.5 - 1.5 mm.">Thread Depth (mm)</label>
            <input type="number" id="a-depth" step="0.01" min="0.1" max="5" placeholder="e.g. 1.2">
        </div>
        <div class="form-row">
            <label title="How many full rotations to fully screw on the cap. Put the cap on and count. Typical: 1.5 - 3.">Engagement Turns</label>
            <input type="number" id="a-turns" step="0.5" min="0.5" max="10" value="2">
        </div>
        <div class="form-row">
            <label title="Cap wall thickness beyond the threads. 3 mm is a good default for FDM printing.">Wall Thickness (mm)</label>
            <input type="number" id="a-wall" step="0.5" min="1" max="20" value="3">
        </div>

        <!-- Bottle B -->
        <div class="section-divider bottle-b">Bottle B -- Top</div>
        <div class="form-row">
            <label>Name</label>
            <input type="text" id="b-label" value="Bottle B" placeholder="e.g. Method Cleaner">
        </div>
        <div class="form-row">
            <label title="Measure across the widest point of the threads on the bottle neck (peak to peak) with calipers.">Thread Diameter (mm)</label>
            <input type="number" id="b-od" step="0.1" min="5" max="200" placeholder="e.g. 25.0">
        </div>
        <div class="form-row">
            <label title="Distance between two adjacent thread peaks (crest to crest). If measuring across N peaks, divide by (N-1).">Thread Pitch (mm)</label>
            <input type="number" id="b-pitch" step="0.01" min="0.5" max="20" placeholder="e.g. 3.5">
        </div>
        <div class="form-row">
            <label title="Width of a single thread ridge -- the solid raised part only, not the gap.">Thread Width (mm)</label>
            <input type="number" id="b-thread-width" step="0.01" min="0.3" max="20" placeholder="e.g. 2.2">
        </div>
        <div class="form-row">
            <label title="Width of the gap/groove between two adjacent thread ridges.">Valley Width (mm)</label>
            <input type="number" id="b-valley-width" step="0.01" min="0.1" max="20" placeholder="e.g. 1.5">
        </div>
        <div id="b-pitch-note" class="pitch-note" style="display:none;"></div>
        <div class="form-row">
            <label title="Usually 1 (single-start). Count how many separate thread beginnings you see at the top of the neck.">Thread Starts</label>
            <input type="number" id="b-starts" step="1" min="1" max="8" value="1">
        </div>
        <div class="form-row">
            <label title="Height of a thread ridge from the neck surface to the top of the thread. Typical: 0.5 - 1.5 mm.">Thread Depth (mm)</label>
            <input type="number" id="b-depth" step="0.01" min="0.1" max="5" placeholder="e.g. 1.0">
        </div>
        <div class="form-row">
            <label title="How many full rotations to fully screw on the cap. Put the cap on and count. Typical: 1.5 - 3.">Engagement Turns</label>
            <input type="number" id="b-turns" step="0.5" min="0.5" max="10" value="2">
        </div>
        <div class="form-row">
            <label title="Cap wall thickness beyond the threads. 3 mm is a good default for FDM printing.">Wall Thickness (mm)</label>
            <input type="number" id="b-wall" step="0.5" min="1" max="20" value="3">
        </div>

        <!-- Settings -->
        <div class="section-divider">Settings</div>
        <div class="form-row">
            <label title="Extra gap added to bore diameter for FDM printing fit. 0.3 mm is typical.">Clearance (mm)</label>
            <input type="number" id="clearance" step="0.05" min="0" max="2" value="0.3">
        </div>
        <div class="form-row">
            <label title="The solid middle section between caps. Taller = easier to grip. Set to 0 for minimal adapter.">Connector Height (mm)</label>
            <input type="number" id="connector-h" step="1" min="0" max="100" value="8">
        </div>

        <!-- Action Buttons -->
        <div class="form-actions">
            <button id="btn-generate" class="btn">Generate</button>
            <button id="btn-download" class="btn">Download</button>
            <button id="btn-save" class="btn btn-success">Save to Gallery</button>
        </div>
    </div>

    <!-- Right: Preview -->
    <div class="preview-panel">
        <h2>Preview</h2>
        <div id="preview-container"></div>
        <div class="preview-stats">
            <span class="stat">Height: <strong id="stat-height">--</strong></span>
            <span class="stat">OD: <strong id="stat-od">--</strong></span>
            <span class="stat">Bore: <strong id="stat-bore">--</strong></span>
            <span class="stat">Cap A: <strong id="stat-cap-a">--</strong></span>
            <span class="stat">Cap B: <strong id="stat-cap-b">--</strong></span>
        </div>
    </div>
</div>

<!-- Save Modal -->
<div id="save-modal" class="modal-overlay">
    <div class="modal">
        <h2>Save Design</h2>
        <div class="form-row">
            <label>Design Name</label>
            <input type="text" id="save-name" placeholder="e.g. Dawn to Method adapter">
        </div>
        <div class="form-row">
            <label>Description</label>
            <input type="text" id="save-desc" placeholder="Optional short note">
        </div>
        <div class="form-row">
            <label>Image URL</label>
            <input type="url" id="save-image" placeholder="https://...">
        </div>
        <div class="hint">Paste a link to a bottle image. Right-click an image online and copy the image address.</div>
        <div class="modal-actions">
            <button id="save-cancel" class="btn">Cancel</button>
            <button id="save-confirm" class="btn btn-success">Save</button>
        </div>
    </div>
</div>

<!-- Gallery Modal -->
<div id="gallery-modal" class="modal-overlay">
    <div class="modal modal-gallery">
        <h2>Community Designs</h2>
        <div class="gallery-search">
            <input type="text" id="gallery-search" placeholder="Search designs...">
        </div>
        <div class="gallery-list">
            <div id="gallery-grid" class="gallery-grid"></div>
        </div>
        <div class="modal-actions">
            <button id="gallery-close" class="btn">Close</button>
        </div>
    </div>
</div>

<!-- Toast -->
<div id="toast-container" class="toast-container"></div>

<!-- App -->
<script type="module" src="js/app.js"></script>

</body>
</html>
