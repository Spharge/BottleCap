<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BottleCap Adapter Generator</title>
    <link rel="stylesheet" href="css/style.css">

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

    <!-- Three.js -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
        }
    }
    </script>
</head>
<body>

<!-- Header -->
<header>
    <div class="logo">BottleCap Adapter Generator</div>
    <nav>
        <button class="tab active" data-view="library">Bottle Library</button>
        <button class="tab" data-view="create">Create Adapter</button>
    </nav>
</header>

<!-- ═══════════════════════════════════════════════ -->
<!-- Bottle Library View                            -->
<!-- ═══════════════════════════════════════════════ -->
<div id="view-library" class="view active">
    <div class="view-header">
        <h2>Bottle Library</h2>
        <button id="btn-add-bottle" class="btn btn-primary">+ Add Bottle</button>
    </div>
    <div class="library-search">
        <input type="text" id="library-search" placeholder="Search bottles...">
    </div>
    <div id="bottle-grid" class="bottle-grid">
        <div class="empty-state">Loading...</div>
    </div>
</div>

<!-- ═══════════════════════════════════════════════ -->
<!-- Create Adapter View                            -->
<!-- ═══════════════════════════════════════════════ -->
<div id="view-create" class="view">
    <div class="create-layout">

        <!-- Left: Selectors + Settings -->
        <div class="form-panel">

            <div class="selector-section">
                <div class="section-divider bottle-a">Bottle A -- Bottom</div>
                <div class="form-row">
                    <label>Select Bottle</label>
                    <select id="select-a"><option value="">-- Choose a bottle --</option></select>
                </div>
                <div id="summary-a" class="bottle-summary hidden"></div>
            </div>

            <div class="selector-section">
                <div class="section-divider bottle-b">Bottle B -- Top</div>
                <div class="form-row">
                    <label>Select Bottle</label>
                    <select id="select-b"><option value="">-- Choose a bottle --</option></select>
                </div>
                <div id="summary-b" class="bottle-summary hidden"></div>
            </div>

            <div class="section-divider">Settings</div>
            <div class="form-row">
                <label title="Extra gap for FDM printing fit. 0.3 mm is typical.">Clearance (mm)</label>
                <input type="number" id="clearance" step="0.05" min="0" max="2" value="0.3">
            </div>
            <div class="form-row">
                <label title="Solid middle section between caps. Taller = easier to grip.">Connector Height (mm)</label>
                <input type="number" id="connector-h" step="1" min="0" max="100" value="8">
            </div>

            <div class="form-actions">
                <button id="btn-download-scad" class="btn" disabled>Download .scad</button>
                <button id="btn-download-stl" class="btn btn-primary" disabled>Download .stl</button>
                <button id="btn-save-adapter" class="btn btn-success" disabled>Save Adapter</button>
            </div>

            <div class="section-divider">Saved Adapters</div>
            <div id="adapter-list" class="adapter-list">
                <div class="empty-state">No saved adapters yet.</div>
            </div>
        </div>

        <!-- Right: Preview -->
        <div class="preview-panel">
            <h2>Preview</h2>
            <div id="preview-container"></div>
            <div class="preview-stats">
                <span class="stat">Height: <strong id="stat-height">--</strong></span>
                <span class="stat">OD: <strong id="stat-od">--</strong></span>
                <span class="stat">Bore: <strong id="stat-bore">--</strong></span>
                <span class="stat">Cap A: <strong id="stat-cap-a">--</strong></span>
                <span class="stat">Cap B: <strong id="stat-cap-b">--</strong></span>
            </div>
        </div>
    </div>
</div>

<!-- ═══════════════════════════════════════════════ -->
<!-- Add/Edit Bottle Modal                          -->
<!-- ═══════════════════════════════════════════════ -->
<div id="bottle-modal" class="modal-overlay">
    <div class="modal modal-wide">
        <h2 id="bottle-modal-title">Add Bottle</h2>

        <div class="form-row">
            <label>Bottle Name *</label>
            <input type="text" id="bm-name" placeholder="e.g. Dawn Dish Soap">
        </div>
        <div class="form-row">
            <label>Image URL</label>
            <input type="url" id="bm-image" placeholder="https://... (optional)">
        </div>

        <div class="modal-divider">Thread Measurements (mm)</div>

        <div class="modal-grid">
            <div class="form-row">
                <label title="Measure across widest point of threads (peak to peak).">Thread Diameter</label>
                <input type="number" id="bm-od" step="0.1" min="5" max="200" placeholder="e.g. 28.5">
            </div>
            <div class="form-row">
                <label title="Distance between adjacent thread peaks (crest to crest).">Thread Pitch</label>
                <input type="number" id="bm-pitch" step="0.01" min="0.5" max="20" placeholder="e.g. 3.8">
            </div>
            <div class="form-row">
                <label title="Width of a single thread ridge -- solid raised part only.">Thread Width</label>
                <input type="number" id="bm-thread-width" step="0.01" min="0.3" max="20" placeholder="e.g. 2.3">
            </div>
            <div class="form-row">
                <label title="Width of gap between adjacent thread ridges.">Valley Width</label>
                <input type="number" id="bm-valley-width" step="0.01" min="0.1" max="20" placeholder="e.g. 2.0">
            </div>
            <div class="form-row">
                <label title="Usually 1. Count thread beginnings at top of neck.">Thread Starts</label>
                <input type="number" id="bm-starts" step="1" min="1" max="8" value="1">
            </div>
            <div class="form-row">
                <label title="Height of thread ridge from neck surface.">Thread Depth</label>
                <input type="number" id="bm-depth" step="0.01" min="0.1" max="5" placeholder="e.g. 1.2">
            </div>
            <div class="form-row">
                <label title="Full rotations to screw on cap.">Engagement Turns</label>
                <input type="number" id="bm-turns" step="0.5" min="0.5" max="10" value="2">
            </div>
            <div class="form-row">
                <label title="Cap wall thickness beyond threads.">Wall Thickness</label>
                <input type="number" id="bm-wall" step="0.5" min="1" max="20" value="3">
            </div>
        </div>

        <div id="bm-pitch-note" class="pitch-note" style="display:none;"></div>

        <div class="modal-actions">
            <button id="bm-cancel" class="btn">Cancel</button>
            <button id="bm-delete" class="btn btn-danger" style="display:none;">Delete</button>
            <button id="bm-new-version" class="btn" style="display:none;">Save as New Version</button>
            <button id="bm-save" class="btn btn-primary">Save Bottle</button>
        </div>
    </div>
</div>

<!-- ═══════════════════════════════════════════════ -->
<!-- Save Adapter Modal                             -->
<!-- ═══════════════════════════════════════════════ -->
<div id="save-modal" class="modal-overlay">
    <div class="modal">
        <h2>Save Adapter Design</h2>
        <div class="form-row">
            <label>Design Name</label>
            <input type="text" id="save-name" placeholder="e.g. Dawn to Method adapter">
        </div>
        <div class="form-row">
            <label>Description</label>
            <input type="text" id="save-desc" placeholder="Optional short note">
        </div>
        <div class="modal-actions">
            <button id="save-cancel" class="btn">Cancel</button>
            <button id="save-confirm" class="btn btn-success">Save</button>
        </div>
    </div>
</div>

<!-- Toast -->
<div id="toast-container" class="toast-container"></div>

<!-- App -->
<script type="module" src="js/app.js"></script>

</body>
</html>
